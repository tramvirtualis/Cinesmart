# ============================================================
# PRODUCTION PROFILE - Render deployment
# Kích hoạt bằng cách set env var trên Render:
#   SPRING_PROFILES_ACTIVE=prod
# ============================================================

# Frontend URL (Vercel)
app.frontend-url=https://cinesmart-movie-ticket-booking.vercel.app

# Mail (Gmail SMTP) — BẮT BUỘC set trên Render Dashboard:
#   MAIL_USERNAME=your@gmail.com
#   MAIL_PASSWORD=xxxx xxxx xxxx xxxx   (App Password, không dùng mật khẩu đăng nhập Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Session cookie — frontend (Vercel) gọi API (Render) cross-origin, cần SameSite=None + Secure
server.forward-headers-strategy=native
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=none

# MoMo - redirect về backend Render để xử lý, sau đó backend tự redirect về frontend
momo.redirect-url=https://cinesmartmovieticketbooking.onrender.com/api/payment/momo/ipn
momo.ipn-url=https://cinesmartmovieticketbooking.onrender.com/api/payment/momo/ipn
momo.return-page-url=https://cinesmart-movie-ticket-booking.vercel.app/payment/success

# ZaloPay callback URL - backend Render nhận callback từ ZaloPay
zalopay.callback.url=https://cinesmartmovieticketbooking.onrender.com/api/payment/zalopay/callback

# Giảm log SQL trên production
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.mail=INFO
