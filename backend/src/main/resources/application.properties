# Secrets: file backend/.env (gitignore) được nạp vào system properties trong BackendApplication.main
# trước Spring — không dùng thư viện dotenv (tránh sai mật khẩu có ký tự $). Biến OS cùng tên vẫn ưu tiên hơn .env.

# Server
server.address=0.0.0.0
server.port=8080

# Database — Hikari cần spring.datasource.password riêng; chỉ gắn user/pass trong JDBC URL thường dẫn tới "using password: NO".
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/movieticketbooking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mail (Gmail SMTP) — user/app password trong .env
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Application Configuration
spring.application.name=movie-ticket-booking

# JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# Session Configuration
server.servlet.session.timeout=5m
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

# Logging Configuration
logging.level.com.example.backend=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# ZaloPay (sandbox URL công khai; key trong .env)
zalopay.app.id=${ZALOPAY_APP_ID}
zalopay.key1=${ZALOPAY_KEY1}
zalopay.key2=${ZALOPAY_KEY2}
zalopay.endpoint=https://sandbox.zalopay.com.vn/v001/tpe/createorder
zalopay.callback.url=${ZALOPAY_CALLBACK_URL:http://localhost:8080/api/payment/zalopay/callback}

# MoMo (sandbox)
momo.partner-code=MOMO
momo.access-key=${MOMO_ACCESS_KEY}
momo.secret-key=${MOMO_SECRET_KEY}
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.redirect-url=${MOMO_REDIRECT_URL:http://localhost:8080/api/payment/momo/ipn}
momo.ipn-url=${MOMO_IPN_URL:http://localhost:8080/api/payment/momo/ipn}
momo.request-type=payWithMethod
momo.partner-name=Cinesmart
momo.store-id=CinesmartStore
momo.lang=vi
momo.extra-data=
momo.payment-code=
momo.order-group-id=
momo.auto-capture=true
momo.return-page-url=${MOMO_RETURN_PAGE_URL:http://localhost:5173/payment/momo-return}

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.redirect-uri=${GOOGLE_REDIRECT_URI:postmessage}

# n8n local integration — API key trong .env; webhook URL từ node Webhook của n8n
n8n.api-key=${N8N_API_KEY:}
n8n.webhook-url=${N8N_WEBHOOK_URL:}

# URL frontend cho n8n AI Agent (link phim, đặt vé)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
